# Coolify Deployment Configuration
# Import this in your Coolify dashboard or use docker-compose.yml directly
#
# Setup in Coolify:
# 1. Create new project "Flowgent"
# 2. Add services: PostgreSQL, Redis (from Coolify marketplace)
# 3. Add application: Docker Compose (point to this repo)
# 4. Set environment variables in Coolify dashboard
# 5. Configure domain: flowgent.yourdomain.com
# 6. Enable SSL (automatic via Coolify)
#
# Required Environment Variables (set in Coolify):
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   JWT_SECRET, JWT_REFRESH_SECRET
#   OPENAI_API_KEY
#   NUXT_PUBLIC_API_BASE (= https://flowgent.yourdomain.com/api)
#
# Coolify will handle:
#   - SSL termination
#   - Reverse proxy (Traefik)
#   - Auto-deployment on git push
#   - Health checks
#   - Log management

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - flowgent_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - flowgent_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 4000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flowgent-api.rule=Host(`${COOLIFY_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.flowgent-api.middlewares=strip-api-prefix"
      - "traefik.http.middlewares.strip-api-prefix.stripprefix.prefixes=/api"
      - "traefik.http.services.flowgent-api.loadbalancer.server.port=4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://backend:4000}
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flowgent-frontend.rule=Host(`${COOLIFY_DOMAIN}`)"
      - "traefik.http.services.flowgent-frontend.loadbalancer.server.port=3000"

volumes:
  flowgent_postgres:
  flowgent_redis:
