# Coolify Deployment Configuration — Backend only
# Server: 135.181.47.19 (Hetzner)
# Frontend is on Vercel (contentrich.nl + dashboard.contentrich.nl)
#
# Required Environment Variables (set in Coolify dashboard):
#   POSTGRES_USER=flowgent
#   POSTGRES_PASSWORD=<strong-password>
#   POSTGRES_DB=flowgent
#   JWT_SECRET=<random-64-chars>
#   JWT_REFRESH_SECRET=<random-64-chars>
#   OPENAI_API_KEY=sk-...
#   COOLIFY_DOMAIN=contentrich.nl
#   CORS_ORIGIN=https://contentrich.nl,https://dashboard.contentrich.nl

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowgent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-flowgent}
    volumes:
      - flowgent_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowgent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowgent

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - flowgent_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowgent

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-flowgent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-flowgent}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CORS_ORIGIN: https://${COOLIFY_DOMAIN:-contentrich.nl},https://dashboard.${COOLIFY_DOMAIN:-contentrich.nl}
      PORT: 4000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - flowgent
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flowgent-api.rule=Host(`api.${COOLIFY_DOMAIN:-contentrich.nl}`)"
      - "traefik.http.routers.flowgent-api.entrypoints=https"
      - "traefik.http.routers.flowgent-api.tls=true"
      - "traefik.http.routers.flowgent-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.flowgent-api.middlewares=api-headers"
      - "traefik.http.middlewares.api-headers.headers.accesscontrolalloworiginlist=https://${COOLIFY_DOMAIN:-contentrich.nl},https://dashboard.${COOLIFY_DOMAIN:-contentrich.nl}"
      - "traefik.http.middlewares.api-headers.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,PATCH,OPTIONS"
      - "traefik.http.middlewares.api-headers.headers.accesscontrolallowheaders=Content-Type,Authorization,x-workspace-id"
      - "traefik.http.middlewares.api-headers.headers.accesscontrolallowcredentials=true"
      - "traefik.http.services.flowgent-api.loadbalancer.server.port=4000"

networks:
  flowgent:
    driver: bridge

volumes:
  flowgent_postgres:
  flowgent_redis:
